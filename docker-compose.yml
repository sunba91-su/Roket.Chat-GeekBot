services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geekbot
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M

volumes:
  bot-data:
