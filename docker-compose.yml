services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        http_proxy: "${http_proxy:-}"
        https_proxy: "${https_proxy:-}"
        no_proxy: "${no_proxy:-}"
    container_name: geekbot
    restart: on-failure
    env_file: .env
    volumes:
      - bot-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M

volumes:
  bot-data:
